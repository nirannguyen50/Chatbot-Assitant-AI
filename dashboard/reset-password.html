<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt lại mật khẩu — Chatbot Platform</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f1f5f9; color: #1e293b; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 40px; width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  .card h1 { font-size: 22px; margin-bottom: 6px; color: #1e293b; }
  .card p  { color: #64748b; font-size: 14px; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #374151; }
  input[type=password] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0;
    border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s;
  }
  input[type=password]:focus { border-color: #4F46E5; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 10px 18px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s;
    background: #4F46E5; color: #fff;
  }
  .btn:hover:not(:disabled) { background: #4338CA; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .msg {
    margin-top: 16px; padding: 12px; border-radius: 8px;
    font-size: 13px; display: none;
  }
  .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  .msg.error   { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
  .back {
    display: block; text-align: center; margin-top: 16px;
    font-size: 13px; color: #4F46E5; text-decoration: none;
  }
  .back:hover { text-decoration: underline; }
  .logo { font-size: 28px; margin-bottom: 12px; }

  /* Token invalid state */
  #invalid-block { display: none; }
  #reset-block   { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖</div>
  <h1>Đặt lại mật khẩu</h1>
  <p>Nhập mật khẩu mới cho tài khoản của bạn.</p>

  <!-- Form đặt lại -->
  <div id="reset-block">
    <div class="form-group">
      <label>Mật khẩu mới</label>
      <input type="password" id="new-pass" placeholder="Tối thiểu 8 ký tự"
             oninput="checkMatch()">
    </div>
    <div class="form-group">
      <label>Xác nhận mật khẩu</label>
      <input type="password" id="confirm-pass" placeholder="Nhập lại mật khẩu"
             oninput="checkMatch()" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Đặt lại mật khẩu</button>
    <div class="msg success" id="msg-success">
      ✅ Mật khẩu đã được đặt lại thành công. Đang chuyển về trang đăng nhập...
    </div>
    <div class="msg error" id="msg-error"></div>
  </div>

  <!-- Trạng thái link không hợp lệ / hết hạn -->
  <div id="invalid-block">
    <div class="msg error" id="msg-invalid" style="display:block">
      ❌ Link đặt lại mật khẩu không hợp lệ hoặc đã hết hạn.<br>
      Vui lòng yêu cầu link mới.
    </div>
  </div>

  <a class="back" href="/dashboard">← Quay lại đăng nhập</a>
</div>

<script>
  const API = "";   // same origin
  const params = new URLSearchParams(location.search);
  const token  = params.get("token") || "";

  if (!token) showInvalid("Không tìm thấy token trong đường dẫn.");

  function showInvalid(msg) {
    document.getElementById("reset-block").style.display   = "none";
    document.getElementById("invalid-block").style.display = "block";
    if (msg) document.getElementById("msg-invalid").textContent = "❌ " + msg;
  }

  function checkMatch() {
    const p1 = document.getElementById("new-pass").value;
    const p2 = document.getElementById("confirm-pass").value;
    const confirmEl = document.getElementById("confirm-pass");
    if (p2 && p1 !== p2) {
      confirmEl.style.borderColor = "#dc2626";
    } else {
      confirmEl.style.borderColor = p2 ? "#22c55e" : "#e2e8f0";
    }
  }

  async function doReset() {
    const newPass     = document.getElementById("new-pass").value;
    const confirmPass = document.getElementById("confirm-pass").value;
    const errEl       = document.getElementById("msg-error");

    errEl.style.display = "none";

    if (!newPass || newPass.length < 8) {
      errEl.textContent = "Mật khẩu phải có ít nhất 8 ký tự.";
      errEl.style.display = "block";
      return;
    }
    if (newPass !== confirmPass) {
      errEl.textContent = "Mật khẩu xác nhận không khớp.";
      errEl.style.display = "block";
      return;
    }

    const btn = document.getElementById("reset-btn");
    btn.disabled    = true;
    btn.textContent = "Đang xử lý...";

    try {
      const res = await fetch(`${API}/api/auth/reset-password`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token, new_password: newPass }),
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById("msg-success").style.display = "block";
        btn.style.display = "none";
        setTimeout(() => { location.href = "/dashboard"; }, 2500);
      } else {
        errEl.textContent   = "❌ " + (data.detail || "Đặt lại mật khẩu thất bại.");
        errEl.style.display = "block";
        if (res.status === 400) showInvalid(data.detail);
      }
    } catch {
      errEl.textContent   = "❌ Lỗi kết nối. Vui lòng thử lại.";
      errEl.style.display = "block";
    } finally {
      btn.disabled    = false;
      btn.textContent = "Đặt lại mật khẩu";
    }
  }
</script>
</body>
</html>
